use_default_settings: true

general:
  instance_name: "Worker Cabinet Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ru"
  formats:
    - html
    - json

server:
  secret_key: "${SEARXNG_SECRET_KEY:-changeme}"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true

engines:
  - name: yandex
    disabled: false

  - name: google
    disabled: false

  - name: duckduckgo
    disabled: false

  - name: wikipedia
    disabled: false

  - name: wikidata
    disabled: false

  - name: bing
    disabled: true

  - name: yahoo
    disabled: true

  - name: mojeek
    disabled: true

ui:
  static_use_hash: true
  default_locale: "ru"
  query_in_title: false
  infinite_scroll: false
  center_alignment: true
  default_theme: "simple"
  theme_args:
    simple_style: "dark"

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
