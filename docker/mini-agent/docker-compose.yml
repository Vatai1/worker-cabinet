services:
  ollama:
    image: ollama/ollama:latest
    container_name: worker-cabinet-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        limits:
          memory: 4g

  mini-agent:
    image: vatai12/worker-cabinet-mini-agent:latest
    container_name: worker-cabinet-mini-agent
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - MODEL=${MINI_AGENT_MODEL:-qwen2.5:3b}
      - BASE_URL=http://ollama:11434/v1
    ports:
      - "127.0.0.1:8642:8642"

volumes:
  ollama_data:
