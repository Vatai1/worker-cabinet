version: '3.8'

services:
  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-documentserver
    restart: unless-stopped
    ports:
      - "8080:80"
      - "4433:443"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_letsencrypt:/var/www/onlyoffice/Data/.letsencrypt
    environment:
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - JWT_ENABLED=false
      - JWT_HEADER=Authorization
      - JWT_BODY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres-onlyoffice:
    image: postgres:15
    container_name: postgres-onlyoffice
    restart: unless-stopped
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_PASSWORD=onlyoffice
      - POSTGRES_ROOT_PASSWORD=root
    volumes:
      - postgres_onlyoffice_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlyoffice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-onlyoffice:
    image: redis:7
    container_name: redis-onlyoffice
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_letsencrypt:
  postgres_onlyoffice_data:
