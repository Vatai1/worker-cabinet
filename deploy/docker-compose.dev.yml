services:
  postgres:
    image: postgres:16-alpine
    container_name: worker-cabinet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-worker_cabinet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - worker-cabinet-network

  keycloak-db:
    image: postgres:16-alpine
    container_name: wc-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - worker-cabinet-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: wc-keycloak
    restart: unless-stopped
    entrypoint: ["/opt/keycloak/entrypoint.sh"]
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak123}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      - KC_HEALTH_ENABLED=true
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ../docker/keycloak-test/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ../docker/keycloak-test/entrypoint.sh:/opt/keycloak/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  minio:
    image: minio/minio:latest
    container_name: worker-cabinet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - worker-cabinet-network

  onlyoffice-redis:
    image: redis:7-alpine
    container_name: worker-cabinet-onlyoffice-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: worker-cabinet-onlyoffice
    restart: unless-stopped
    environment:
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-changeme}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${ONLYOFFICE_DB_NAME:-onlyoffice}
      DB_USER: ${DB_USER:-postgres}
      DB_PWD: ${DB_PASSWORD:-changeme}
      REDIS_SERVER_HOST: onlyoffice-redis
      REDIS_SERVER_PORT: "6379"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/healthcheck || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - worker-cabinet-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: worker-cabinet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-worker_cabinet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - worker-cabinet-network

  notification-service:
    image: ${NOTIFICATION_IMAGE:-vatai12/worker-cabinet-notification:latest}
    container_name: worker-cabinet-notifications
    restart: unless-stopped
    environment:
      PORT: "5001"
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-worker_cabinet}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-worker_cabinet}:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
    ports:
      - "${NOTIFICATION_PORT:-5001}:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  mini-agent:
    image: vatai12/worker-cabinet-mini-agent:latest
    container_name: worker-cabinet-mini-agent
    restart: unless-stopped
    environment:
      MODEL: ${MINI_AGENT_MODEL:-qwen2.5:3b}
      BASE_URL: ${MINI_AGENT_BASE_URL:-http://host.docker.internal:11434/v1}
    ports:
      - "127.0.0.1:8642:8642"
    networks:
      - worker-cabinet-network

  backend:
    image: ${BACKEND_IMAGE:-vatai12/worker-cabinet-backend:latest}
    container_name: worker-cabinet-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-worker_cabinet}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:${KEYCLOAK_PORT:-8081}
      KEYCLOAK_REALM: worker-cabinet
      KEYCLOAK_CLIENT_ID: worker-cabinet
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      FRONTEND_URL: http://localhost:${APP_PORT:-3000}
      PUBLIC_URL: http://localhost:${APP_PORT:-3000}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-worker-cabinet}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-worker_cabinet}:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-"Worker Cabinet" <noreply@example.com>}
      NOTIFICATION_SECRET: ${NOTIFICATION_SECRET:-changeme}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  frontend:
    image: ${FRONTEND_IMAGE:-vatai12/worker-cabinet-frontend:latest}
    container_name: worker-cabinet-frontend
    restart: unless-stopped
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "5000"
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_ENVSUBST_PARAMS: $${BACKEND_HOST} $${BACKEND_PORT} $${NGINX_SERVER_NAME}
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - worker-cabinet-network

volumes:
  postgres_data:
  keycloak_db_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  rabbitmq_data:

networks:
  worker-cabinet-network:
    driver: bridge
