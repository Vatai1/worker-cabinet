version: '3.8'

services:
  frontend:
    image: ${FRONTEND_IMAGE:-vatai12/worker-cabinet-frontend:latest}  # образ фронтенда
    container_name: worker-cabinet-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"                                         # порт nginx
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-192.168.1.100}                   # IP сервера бэкенда
      BACKEND_PORT: ${BACKEND_PORT:-5000}                            # порт бэкенда
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}                     # доменное имя ( _ = любой )
      NGINX_ENVSUBST_PARAMS: $${BACKEND_HOST} $${BACKEND_PORT} $${NGINX_SERVER_NAME}  # только эти vars
    networks:
      - worker-cabinet-network

networks:
  worker-cabinet-network:
    driver: bridge
