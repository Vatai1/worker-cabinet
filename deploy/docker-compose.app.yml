version: '3.8'

services:
  frontend:
    image: ${REGISTRY:-vatai12}/${FRONTEND_IMAGE:-worker-cabinet-frontend:latest}  # образ фронтенда
    container_name: worker-cabinet-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"                                                      # порт nginx
    networks:
      - worker-cabinet-network

networks:
  worker-cabinet-network:
    driver: bridge
