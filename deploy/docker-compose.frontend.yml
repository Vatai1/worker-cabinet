services:
  frontend:
    image: ${FRONTEND_IMAGE:-vatai12/worker-cabinet-frontend:latest}
    container_name: worker-cabinet-frontend
    restart: unless-stopped
    environment:
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT:-5000}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_ENVSUBST_PARAMS: $${BACKEND_HOST} $${BACKEND_PORT} $${NGINX_SERVER_NAME}
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - worker-cabinet-network

networks:
  worker-cabinet-network:
    driver: bridge
