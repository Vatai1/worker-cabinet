version: '3.8'

services:
  backend:
    image: vatai12/worker-cabinet-backend:latest          # образ бэкенда
    container_name: worker-cabinet-backend
    restart: unless-stopped
    ports:
      - "5000:5000"                                        # порт API
    environment:
      - PORT=5000                                          # внутренний порт приложения
      - NODE_ENV=production                                # режим работы
      - DB_HOST=postgres                                   # хост БД (имя сервиса)
      - DB_PORT=5432                                       # порт БД
      - DB_NAME=worker_cabinet                             # имя БД
      - DB_USER=postgres                                   # пользователь БД
      - DB_PASSWORD=changeme                               # пароль БД
      - JWT_SECRET=changeme                                # секрет подписи JWT
      - ADMIN_EMAIL=admin@example.com                        # email администратора
      - ADMIN_PASSWORD=admin123                             # пароль администратора
      - S3_ENDPOINT=http://minio:9000                      # адрес S3
      - S3_ACCESS_KEY=minioadmin                           # ключ S3
      - S3_SECRET_KEY=minioadmin                           # секретный ключ S3
      - S3_BUCKET=worker-cabinet                           # бакет S3
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  postgres:
    image: postgres:16-alpine
    container_name: worker-cabinet-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres                              # пользователь БД
      POSTGRES_PASSWORD: changeme                          # пароль БД
      POSTGRES_DB: worker_cabinet                          # имя БД
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  minio:
    image: minio/minio:latest
    container_name: worker-cabinet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"                                        # S3 API
      - "9001:9001"                                        # веб-консоль
    environment:
      MINIO_ROOT_USER: minioadmin                          # пользователь MinIO
      MINIO_ROOT_PASSWORD: minioadmin                      # пароль MinIO
      MINIO_BROWSER: off                                   # отключить встроенный браузер
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - worker-cabinet-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: worker-cabinet-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true                                   # включить JWT
      - JWT_HEADER=Authorization                           # заголовок JWT
      - JWT_SECRET=changeme                                # секрет JWT
      - JWT_BODY=false                                     # JWT не в теле запроса
      - WOPI_ENABLED=true                                  # поддержка WOPI
      - ALLOW_PRIVATE_IP_ADDRESS=true                      # разрешить запросы к внутренним IP
      - ALLOW_META_IP_ADDRESS=true                         # разрешить meta-запросы
      - USE_UNAUTHORIZED_STORAGE=false                     # неавторизованное хранилище
      - DB_TYPE=postgres                                   # тип БД
      - DB_HOST=postgres                                   # хост БД
      - DB_PORT=5432                                       # порт БД
      - DB_NAME=onlyoffice                                 # имя БД
      - DB_USER=postgres                                   # пользователь БД
      - DB_PWD=changeme                                    # пароль БД
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - worker-cabinet-network
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice-redis:
        condition: service_healthy

  onlyoffice-redis:
    image: redis:7-alpine
    container_name: worker-cabinet-onlyoffice-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: worker-cabinet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: worker_cabinet                # пользователь RMQ
      RABBITMQ_DEFAULT_PASS: changeme                      # пароль RMQ
    ports:
      - "5672:5672"                                        # AMQP
      - "15672:15672"                                      # веб-интерфейс
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - worker-cabinet-network

  notification-service:
    image: vatai12/worker-cabinet-notification:latest
    container_name: worker-cabinet-notifications
    restart: unless-stopped
    environment:
      PORT: 5001                                           # порт сервиса
      NODE_ENV: production                                 # режим работы
      DB_HOST: postgres                                    # хост БД
      DB_PORT: 5432                                        # порт БД
      DB_NAME: worker_cabinet                              # имя БД
      DB_USER: postgres                                    # пользователь БД
      DB_PASSWORD: changeme                                # пароль БД
      RABBITMQ_URL: amqp://worker_cabinet:changeme@rabbitmq:5672  # подключение к RMQ
      MAIL_HOST: smtp.example.com                          # SMTP-сервер
      MAIL_PORT: 587                                       # порт SMTP
      MAIL_SECURE: false                                   # STARTTLS
      MAIL_USER: ""                                        # пользователь SMTP
      MAIL_PASSWORD: ""                                    # пароль SMTP
      MAIL_FROM: '"Worker Cabinet" <noreply@example.com>'  # отправитель
      NOTIFICATION_SECRET: changeme                        # секрет для подписи уведомлений
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: worker-cabinet-hermes
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=1000                                    # UID внутри контейнера
      - HERMES_GID=1000                                    # GID внутри контейнера
      - HERMES_HOME=/opt/data                              # домашняя директория
      - API_SERVER_ENABLED=true                            # включить API-сервер
      - API_SERVER_KEY=changeme                            # ключ аутентификации API
      - API_SERVER_HOST=0.0.0.0                            # хост API
      - API_SERVER_PORT=8642                               # порт API
      - SEARXNG_URL=http://searxng:8080                    # поисковик
    ports:
      - "127.0.0.1:8642:8642"
    command: ["gateway", "run"]
    networks:
      - worker-cabinet-network
    depends_on:
      searxng:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    container_name: worker-cabinet-searxng
    restart: unless-stopped
    volumes:
      - ../docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "127.0.0.1:8888:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - worker-cabinet-network

volumes:
  postgres_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  rabbitmq_data:
  hermes_data:

networks:
  worker-cabinet-network:
    driver: bridge
