version: '3.8'

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: wc-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak123}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - worker-cabinet-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: wc-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-relative-path=/
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak123}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin123}
      - KC_HEALTH_ENABLED=true
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ../docker/keycloak-test/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  backend:
    image: vatai12/worker-cabinet-backend:latest
    container_name: worker-cabinet-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=worker_cabinet
      - DB_USER=postgres
      - DB_PASSWORD=***
      - JWT_SECRET=***
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_PUBLIC_URL=http://${KEYCLOAK_PUBLIC_URL:-localhost}:${KEYCLOAK_PORT:-8081}
      - KEYCLOAK_REALM=worker-cabinet
      - KEYCLOAK_CLIENT_ID=worker-cabinet
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-changeme}
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=***
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=***
      - S3_BUCKET=worker-cabinet
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  postgres:
    image: postgres:16-alpine
    container_name: worker-cabinet-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: worker_cabinet
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  minio:
    image: minio/minio:latest
    container_name: worker-cabinet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER: off
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - worker-cabinet-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: worker-cabinet-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true
      - JWT_HEADER=Authorization
      - JWT_SECRET=***
      - JWT_BODY=false
      - WOPI_ENABLED=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - USE_UNAUTHORIZED_STORAGE=***
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=postgres
      - DB_PWD=changeme
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - worker-cabinet-network
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice-redis:
        condition: service_healthy

  onlyoffice-redis:
    image: redis:7-alpine
    container_name: worker-cabinet-onlyoffice-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: worker-cabinet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: worker_cabinet
      RABBITMQ_DEFAULT_PASS: changeme
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - worker-cabinet-network

  notification-service:
    image: vatai12/worker-cabinet-notification:latest
    container_name: worker-cabinet-notifications
    restart: unless-stopped
    environment:
      PORT: 5001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: worker_cabinet
      DB_USER: postgres
      DB_PASSWORD: changeme
      RABBITMQ_URL: amqp://worker_cabinet:***@rabbitmq:5672
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_SECURE: false
      MAIL_USER: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: '"Worker Cabinet" <noreply@example.com>'
      NOTIFICATION_SECRET: changeme
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - worker-cabinet-network

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: worker-cabinet-hermes
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - HERMES_HOME=/opt/data
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=changeme
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - SEARXNG_URL=http://searxng:8080
    ports:
      - "127.0.0.1:8642:8642"
    command: ["gateway", "run"]
    networks:
      - worker-cabinet-network
    depends_on:
      searxng:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    container_name: worker-cabinet-searxng
    restart: unless-stopped
    volumes:
      - ../docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "127.0.0.1:8888:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - worker-cabinet-network

volumes:
  keycloak_db_data:
  postgres_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  rabbitmq_data:
  hermes_data:

networks:
  worker-cabinet-network:
    driver: bridge
