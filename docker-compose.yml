version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: worker-cabinet-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: worker_cabinet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  minio:
    image: minio/minio:latest
    container_name: worker-cabinet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_BROWSER: "on"
      MINIO_SERVER_URL: "http://localhost:9000"
      MINIO_REGION_NAME: "us-east-1"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - worker-cabinet-network

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: worker-cabinet-onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
      - "4433:443"
    environment:
      - JWT_ENABLED=false
      - JWT_HEADER=Authorization
      - JWT_BODY=false
      - WOPI_ENABLED=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      - ALLOW_META_IP_ADDRESS=true
      - USE_UNAUTHORIZED_STORAGE=true
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=postgres
      - DB_PWD=postgres
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - worker-cabinet-network
    depends_on:
      postgres:
        condition: service_healthy
      onlyoffice-redis:
        condition: service_healthy

  onlyoffice-redis:
    image: redis:7-alpine
    container_name: worker-cabinet-onlyoffice-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worker-cabinet-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: worker-cabinet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: worker_cabinet
      RABBITMQ_DEFAULT_PASS: rabbitmq_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - worker-cabinet-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: worker-cabinet-notifications
    environment:
      PORT: 5001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: worker_cabinet
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_URL: amqp://worker_cabinet:rabbitmq_secret@rabbitmq:5672
      MAIL_HOST: ${MAIL_HOST:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-"Worker Cabinet" <noreply@example.com>}
      NOTIFICATION_SECRET: ${NOTIFICATION_SECRET:-change-this-secret}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - worker-cabinet-network

volumes:
  postgres_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  rabbitmq_data:

networks:
  worker-cabinet-network:
    driver: bridge
