<!DOCTYPE html>
<html>
<head>
    <title>OnlyOffice Test</title>
    <script src="http://localhost:8080/web-apps/apps/api/documents/api.js"></script>
</head>
<body>
    <h1>OnlyOffice Test</h1>
    <div id="editor" style="width: 100%; height: 600px;"></div>
    
    <script>
        const testUrl = 'http://host.docker.internal:5000/api/onboarding/documents/1/file?token=TEST_TOKEN';
        
        console.log('Test URL:', testUrl);
        
        const config = {
            document: {
                fileType: 'pdf',
                key: 'test-' + Date.now(),
                title: 'Test Document.pdf',
                url: testUrl,
                permissions: {
                    edit: false,
                    download: true,
                    print: true,
                },
            },
            editorConfig: {
                lang: 'ru',
                mode: 'view',
            },
            height: '600px',
            width: '100%',
            type: 'desktop',
        };
        
        console.log('Config:', config);
        
        new DocsAPI.DocEditor('editor', config);
    </script>
</body>
</html>
